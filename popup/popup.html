<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="fa/all.min.css">
</head>
<body>
  <div id="header">
    <img id="title-logo" src="logo_platBR.png" alt="Plataforma Brasil">
    <span id="status-dot" class="dot dot-off" title="Página não detectada"></span>
  </div>

  <div id="actions">
    <button data-action="copyData" class="btn">
      <i class="fa-regular fa-clipboard"></i> Copiar dados do projeto
    </button>
    <button data-action="togglePanels" class="btn">
      <i class="fa-solid fa-chevron-down"></i> Expandir / Colapsar seções
    </button>
    <!--#<button data-action="toggleReadMode" class="btn">
    #  <i class="fa-solid fa-glasses"></i> Modo leitura (ocultar nav)
    </button> -->
    <button data-action="aumentarQuadro" data-toggle="true" class="btn">
      <i class="fa-regular fa-square"></i> Aumentar quadro
    </button>
    <button data-action="abrirArvore" class="btn">
      <i class="fa-solid fa-sitemap"></i> Abrir árvore de documentos
    </button>
    <button id="btn-open-protocols" class="btn btn-protocols">
      <i class="fa-solid fa-magnifying-glass"></i> Lista de protocolos
    </button>
    <button data-action="submeterNotificacao" class="btn">
      <i class="fa-regular fa-share-from-square"></i> Submeter notificação
    </button>
    <button data-action="submeterEmenda" class="btn">
      <i class="fa-solid fa-plus"></i> Enviar emenda
    </button>
    <div class="section-divider"></div>
    <button id="btn-salvar-e-imprimir" class="btn"><i class="fa-regular fa-file-pdf"></i> Imprimir / Salvar PDF</button>

  </div>

  <!-- Painel de protocolos (oculto por padrão) -->
  <div id="protocols-panel" class="hidden">
    <div id="protocols-header">
      <button id="btn-back" class="btn-icon"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
      <span>Lista de Protocolos</span>
    </div>

    <div id="protocols-add-row">
      <button id="btn-show-add" class="btn btn-add"><i class="fa-solid fa-plus"></i> Adicionar Protocolo</button>
    </div>

    <div id="protocols-form" class="hidden">
      <input id="input-nome" type="text" placeholder="Nome (ex: Estudo)" maxlength="25" />
      <div id="protocols-caae-auto" class="hidden">
        <span id="protocols-caae-value"></span>
      </div>
      <div id="protocols-form-actions">
        <button id="btn-add-confirm" class="btn">Adicionar</button>
        <button id="btn-add-cancel" class="btn btn-cancel">Cancelar</button>
      </div>
    </div>

    <div id="protocols-list"></div>
  </div>

  <div id="feedback"></div>
  <script src="protocols.js"></script>
  <script src="popup.js"></script>
</body>
</html>
